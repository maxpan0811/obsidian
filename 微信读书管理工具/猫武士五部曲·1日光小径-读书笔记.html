<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>猫武士五部曲·1日光小径 - 读书笔记</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: linear-gradient(160deg, #f8f9fc 0%, #eef1f5 100%);
    font-family: -apple-system, "PingFang SC", "Noto Sans SC", "LXGW WenKai", "Microsoft YaHei", sans-serif;
    padding: 40px 20px;
    min-height: 100vh;
  }

  .container {
    max-width: 820px;
    margin: 0 auto;
  }

  /* ===== 书籍头部 ===== */
  .book-header {
    background: linear-gradient(135deg, #2c3e50 0%, #1a252f 100%);
    border-radius: 18px;
    padding: 48px 40px;
    margin-bottom: 32px;
    color: #fff;
    box-shadow: 0 10px 40px rgba(0,0,0,0.12);
    position: relative;
    overflow: hidden;
    display: flex;
    gap: 32px;
    align-items: flex-start;
  }

  .book-header::before {
    content: '';
    position: absolute;
    top: -40%;
    right: -10%;
    width: 280px;
    height: 280px;
    background: rgba(255,255,255,0.03);
    border-radius: 50%;
  }

  .book-cover {
    width: 100px;
    height: 140px;
    border-radius: 8px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    flex-shrink: 0;
    object-fit: cover;
    background: rgba(255,255,255,0.08);
    position: relative;
    z-index: 1;
  }

  .book-info {
    flex: 1;
    position: relative;
    z-index: 1;
  }

  .book-title {
    font-size: 26px;
    font-weight: 700;
    margin-bottom: 6px;
    letter-spacing: 0.5px;
  }

  .book-author {
    font-size: 15px;
    opacity: 0.7;
    margin-bottom: 16px;
  }

  .book-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .book-tag {
    background: rgba(255,255,255,0.12);
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 12px;
    opacity: 0.8;
  }

  /* ===== 统计栏 ===== */
  .stats-bar {
    background: #fff;
    border-radius: 14px;
    padding: 20px 24px;
    margin-bottom: 32px;
    display: flex;
    justify-content: space-around;
    box-shadow: 0 2px 12px rgba(0,0,0,0.05);
    border: 1px solid rgba(0,0,0,0.03);
  }

  .stat-item {
    text-align: center;
  }

  .stat-num {
    font-size: 26px;
    font-weight: 700;
    color: #2c3e50;
    line-height: 1.2;
  }

  .stat-label {
    font-size: 12px;
    color: #aaa;
    margin-top: 2px;
  }

  .stat-divider {
    width: 1px;
    background: #eee;
  }

  /* ===== 章节 ===== */
  .chapter-section {
    margin-bottom: 32px;
  }

  .chapter-title {
    font-size: 17px;
    font-weight: 600;
    color: #333;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .ch-num {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 26px;
    height: 26px;
    border-radius: 8px;
    color: #fff;
    font-size: 13px;
    font-weight: 600;
    flex-shrink: 0;
  }

  .ch-title-text {
    font-size: 17px;
    font-weight: 600;
  }

  .ch-count {
    font-size: 12px;
    font-weight: 400;
    color: #aaa;
    margin-left: auto;
  }

  .card-header-right {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .card-loc {
    display: inline-block;
    padding: 1px 8px;
    border-radius: 10px;
    font-size: 11px;
    font-weight: 500;
    font-family: "SF Mono", "PingFang SC", monospace;
    line-height: 1.6;
  }

  /* ===== 卡片 ===== */
  .cards-container {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .highlight-card {
    background: #fff;
    border-radius: 12px;
    padding: 16px 20px;
    border-left: 4px solid #4A90D9;
    box-shadow: 0 1px 4px rgba(0,0,0,0.04);
    transition: transform 0.2s, box-shadow 0.2s;
    position: relative;
  }

  .highlight-card:hover {
    transform: translateX(6px);
    box-shadow: 0 6px 20px rgba(0,0,0,0.08);
  }

  .highlight-card.orphan {
    opacity: 0.85;
  }

  .card-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 6px;
  }

  .quote-icon {
    font-size: 28px;
    line-height: 1;
    font-family: Georgia, serif;
    opacity: 0.3;
  }

  .card-time {
    font-size: 11px;
    color: #bbb;
  }

  .card-body {
    position: relative;
  }

  .highlight-text {
    font-size: 14.5px;
    line-height: 1.85;
    color: #333;
    text-align: justify;
  }

  .review-bubble {
    margin-top: 10px;
    padding: 10px 14px;
    background: #FFF8E1;
    border-radius: 8px;
    font-size: 13.5px;
    line-height: 1.6;
    color: #8D6E00;
    display: flex;
    gap: 8px;
    align-items: flex-start;
  }

  .review-bubble.standalone {
    background: #F3E8FF;
    color: #6B21A8;
  }

  .review-icon {
    flex-shrink: 0;
    font-size: 14px;
    line-height: 1.6;
  }

  .review-text {
    flex: 1;
  }

  /* ===== 底部 ===== */
  .footer {
    text-align: center;
    padding: 40px 0 20px;
    color: #bbb;
    font-size: 12px;
  }

  .footer a { color: #888; text-decoration: none; }

  @media (max-width: 640px) {
    body { padding: 16px 12px; }
    .book-header { padding: 28px 20px; flex-direction: column; gap: 16px; }
    .book-cover { width: 80px; height: 112px; }
    .book-title { font-size: 20px; }
    .stats-bar { flex-wrap: wrap; gap: 8px; padding: 14px; }
    .stat-divider { display: none; }
  }
</style>
</head>
