name: Sync to Gitee

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Force push to Gitee
        run: |
          echo "::group::Push to Gitee"
          git remote add gitee https://maxpan0811:${{ secrets.GITEE }}@gitee.com/maxpan0811/obsidian.git
          git remote -v
          git push --force-with-lease gitee main 2>&1 || (echo "⚠️ force-with-lease failed, trying -f..." && git push -f gitee main 2>&1)
          echo "::endgroup::"
