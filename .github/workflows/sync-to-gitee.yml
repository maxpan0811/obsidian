name: Sync to Gitee

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Sync to Gitee
        run: |
          echo "::group::Sync to Gitee"
          git remote add gitee https://maxpan0811:${{ secrets.GITEE }}@gitee.com/maxpan0811/obsidian.git
          git remote -v
          # Strategy 1: normal push (fast path)
          if git push gitee main 2>&1; then echo "✅ Normal push"; exit 0; fi
          echo "⚠️ Normal push failed"
          # Strategy 2: delete + push fresh (bypasses Gitee force-push protection)
          echo "🔄 Deleting remote main branch..."
          git push gitee :refs/heads/main 2>&1 || echo "  (delete already done)"
          git push gitee main 2>&1 && echo "✅ Delete + push succeeded" || { echo "❌ Failed"; exit 1; }
          echo "::endgroup::"
