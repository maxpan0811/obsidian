name: Sync to Gitee

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Force push to Gitee
        run: |
          git remote add gitee https://maxpan0811:${{ secrets.GITEE }}@gitee.com/maxpan0811/obsidian.git
          git push --force-with-lease gitee main 2>&1 || git push -f gitee main
